<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noora ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  font-family:'Cairo', sans-serif;
}

body{
  margin:0;
  height:100vh;
  background:url("bg.jpg") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  overflow:hidden;
}

/* يخلي الشكل مناسب للموبايل */
.overlay{
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:20px;
  width:95%;
  max-width:400px;
  text-align:center;
}

h2{
  font-size:22px;
}

#img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:15px;
  margin-bottom:15px;
}

button{
  margin-top:15px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:25px;
  background:#ff4d8d;
  color:white;
  font-size:16px;
}

#text{
  min-height:110px;
  font-size:16px;
  line-height:1.7;
}

/* قلوب */
.heart{
  position:absolute;
  color:#ff4d8d;
  animation:float 6s linear infinite;
  opacity:0.7;
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div class="overlay">
  <h2 id="title"></h2>

  <!-- البداية -->
  <div id="startScreen">
    <p style="font-size:17px;">
      يمكن هالمرة أحچي شي ما گدرّت أگوله قبل…
    </p>
    <button onclick="startStory()">ابدأ 💕</button>
  </div>

  <!-- المحتوى -->
  <img id="img" src="img1.jpg" style="display:none;">
  <p id="text"></p>
  <button id="btn" style="display:none;">التالي 💕</button>
</div>

<audio id="music" src="music.mp3" loop></audio>

<script>

const name = "Noora";
document.getElementById("title").innerText = name + " ❤️";

const messages = [
"إنتِ أحلى صورة بكل ذكرياتي 💗",
"وياج حتى السكوت يصير دافي 💞",
"كل ابتسامة منج تبقى بقلبي ✨",
"قلبي اختارج بكل مرة 💖",
"إنتِ راحتي بهالدنيا المزدحمة 🌙",
"دوم إنتِ… وبس إنتِ ❤️"
];

const images = [
"img1.jpg","img2.jpg","img3.jpg",
"img4.jpg","img5.jpg","img6.jpg"
];

const finalMessage = `أحبج كد ماكو نبض بقلبي… ويمكن أكثر.
وجودج يمّي راحة ما تنوصف.
عيونج وطني، وبقلبي إنتِ ساكنة.
لو بإيدي، أكتب اسمج بكل تفاصيل يومي.
`;

// عناصر
const textEl = document.getElementById("text");
const btn = document.getElementById("btn");
const img = document.getElementById("img");
const music = document.getElementById("music");

let i = 0;
let j = 0;
let isTyping = false;

// صوت
let started = false;
document.addEventListener("click", () => {
  if(!started){
    music.play().catch(()=>{});
    started = true;
  }
});

// بدء
function startStory(){
  document.getElementById("startScreen").style.display = "none";
  img.style.display = "block";
  btn.style.display = "block";
  startTyping();
}

// كتابة
function startTyping(){
  isTyping = true;
  textEl.innerHTML = "";
  img.src = images[i];
  let text = messages[i];
  j = 0;

  function type(){
    if(j < text.length){
      textEl.innerHTML += text[j];
      j++;
      setTimeout(type,25);
    } else {
      isTyping = false;
    }
  }
  type();
}

// التالي
btn.onclick = function(){
  if(isTyping) return;

  i++;

  if(i < messages.length){
    startTyping();
  } else {
    showFinal();
  }
};

// النهاية
function showFinal(){
  img.style.display = "none";
  textEl.innerHTML = finalMessage;
  btn.innerText = "إنهاء ❤️";
  btn.onclick = showEnd;
}

function showEnd(){
  document.querySelector(".overlay").innerHTML = `
    <h2>❤️</h2>
    </p>بعشقج ياملكة قلبي ❤️</p>
  `;
}

// قلوب
setInterval(()=>{
  let h = document.createElement("div");
  h.className="heart";
  h.innerHTML="❤";
  h.style.left = Math.random()*100 + "vw";
  h.style.fontSize = (15 + Math.random()*15) + "px";

  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},600);

</script>

</body>
</html>
